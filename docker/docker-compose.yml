services:
  database:
    image: postgres
    container_name: postgres
    restart: always
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - '5432:5432'
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 1s
      timeout: 10s
      retries: 10

  redis:
    image: redis 
    container_name: redis 
    restart: always
    ports:
      - '6379:6379'
    healthcheck:
      test: [ "CMD", "redis-cli", "--raw", "incr", "ping" ]
      interval: 1s
      timeout: 10s
      retries: 10 

  backend:
    build:
      context: ../
      dockerfile: docker/backend/Dockerfile
    container_name: backend
    env_file: ../apps/backend/.env
    environment:
      # Override localhost URLs with Docker service names
      DATABASE_URL: postgresql://postgres:nagmani@database:5432/postgres
      REDIS_URL: redis://redis:6379
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3001:3001"

  worker:
    build:
      context: ../
      dockerfile: docker/worker/Dockerfile
    container_name: worker
    network_mode: host
    env_file: ../apps/worker/.env
    environment:
      # With host networking, localhost works since worker shares host network
      DATABASE_URL: postgresql://postgres:nagmani@localhost:5432/postgres
      # Shared path between container and host so Docker daemon can access build contexts
      WORK_DIR: /tmp/devforces-work
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/devforces-work:/tmp/devforces-work
    depends_on:
      redis:
        condition: service_healthy

  web:
    build:
      context: ../
      dockerfile: docker/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "http://localhost:3001"
    container_name: web
    env_file: ../apps/web/.env
    ports:
      - "3000:3000"
